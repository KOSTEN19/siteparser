services:
  elasticsearch:
    profiles: ["full"]
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.16
    container_name: parsesite-elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\"'"]
      interval: 20s
      timeout: 10s
      retries: 10

  kibana:
    profiles: ["full"]
    image: docker.elastic.co/kibana/kibana:7.17.16
    container_name: parsesite-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: parsesite-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbit-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10

  postgres:
    image: postgres:15
    container_name: parsesite-postgres
    environment:
      - POSTGRES_USER=parsesite
      - POSTGRES_PASSWORD=parsesite
      - POSTGRES_DB=parsesite
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./ops/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parsesite -d parsesite"]
      interval: 15s
      timeout: 10s
      retries: 10

  prometheus:
    profiles: ["full"]
    image: prom/prometheus:v2.53.1
    container_name: parsesite-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  scheduler-service:
    image: eclipse-temurin:8-jre
    working_dir: /app
    command: ["java", "-jar", "/app/scheduler-service.jar"]
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    volumes:
      - ./scheduler-service/target/scheduler-service-0.1.0.jar:/app/scheduler-service.jar:ro
    ports:
      - "8081:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  crawler-service:
    image: eclipse-temurin:8-jre
    working_dir: /app
    command: ["java", "-jar", "/app/crawler-service.jar"]
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    volumes:
      - ./crawler-service/target/crawler-service-0.1.0.jar:/app/crawler-service.jar:ro
      - ./output:/app/output
    ports:
      - "8082:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
  indexer-service:
    profiles: ["full"]
    build:
      context: .
      dockerfile: services.Dockerfile
      target: indexer-runtime
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8083:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      postgres:
        condition: service_healthy

  analytics-service:
    profiles: ["full"]
    build:
      context: .
      dockerfile: services.Dockerfile
      target: analytics-runtime
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8084:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      postgres:
        condition: service_healthy

  api-service:
    profiles: ["full"]
    build:
      context: .
      dockerfile: services.Dockerfile
      target: api-runtime
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8080:8080"
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  es-data:
  rabbit-data:
  postgres-data:
